# Secrets and URLs: set in Netlify UI (DATABASE_URL, DIRECT_URL, NEXTAUTH_*, etc.)
#
# Deploy reliability: do NOT set "Publish directory" to `.next` in the Netlify UI — leave it empty so
# @netlify/plugin-nextjs owns output. Stale local `.netlify/` can make CLI uploads hang; `npm run deploy` clears it first.
# Prefer Git-triggered builds on Netlify if CLI uploads keep stalling.

[build]
  # Temporary: skip Prisma migrate during deploy while DB connectivity is unstable.
  # Force production React/Next behavior; local `.env.local` may set NODE_ENV=development and break prerender.
  command = "NODE_ENV=production npm run build"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  directory = "netlify/functions"
